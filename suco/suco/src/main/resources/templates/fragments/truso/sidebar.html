<div th:fragment="sidebar(activePage, truSo)"> <aside class="sidebar" id="sidebar">
    <div class="sidebar-header" style="display: flex; flex-direction: column; align-items: flex-start; gap: 8px; position: relative; padding-bottom: 15px;">
      
      <h2
        style="
          font-size: 1.35rem;
          margin: 0;
          font-weight: 700;
          display: flex;
          align-items: center;
          gap: 10px;
          color: #fff;
          line-height: 1.2;
        "
      </h2>
        <i class="fa-solid fa-shield-heart" style="color: #fff"></i>
        <span>Trụ sở</span>
      </h2>

      <div class="tru-so-info" th:if="${truSo != null}" 
           style="font-size: 0.85rem; color: #cbd5e1; font-weight: 400; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 4px; width: 100%; box-sizing: border-box; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
        <i class="fa-solid fa-building-user" style="margin-right: 6px; color: #a5d6a7;"></i>
        <span th:text="${truSo.tenTruSo}">Tên Trụ Sở Mẫu</span>
      </div>

      <button class="toggle-btn" onclick="toggleSidebar()" style="position: absolute; right: 10px; top: 15px;">
        <i class="fa-solid fa-chevron-left" id="toggle-icon"></i>
      </button>
    </div>

    <nav class="nav-menu">
      <a
        href="/truso/trang-chu"
        th:class="${activePage == 'map'} ? 'nav-item active' : 'nav-item'"
      >
        <i class="fa-solid fa-map-location-dot"></i>
        <span>Bản đồ khẩn cấp</span>
      </a>

      <a
        href="/truso/da-tiep-nhan"
        th:class="${activePage == 'received'} ? 'nav-item active' : 'nav-item'"
      >
        <i class="fa-solid fa-inbox"></i> <span>Đã tiếp nhận</span>
      </a>

      <a
        href="/truso/dang-di-chuyen"
        th:class="${activePage == 'pending'} ? 'nav-item active' : 'nav-item'"
      >
        <i class="fa-solid fa-clock-rotate-left"></i>
        <span>Đang di chuyển</span>
      </a>

      <a
        href="/truso/dang-xu-ly"
        th:class="${activePage == 'doing'} ? 'nav-item active' : 'nav-item'"
      >
        <i class="fa-solid fa-truck-medical"></i>
        <span>Đang cứu hộ</span>
      </a>

      <a
        href="/truso/da-xu-ly"
        th:class="${activePage == 'history'} ? 'nav-item active' : 'nav-item'"
      >
        <i class="fa-solid fa-list-check"></i>
        <span>Lịch sử cứu hộ</span>
      </a>
      <a
        href="/truso/huy-xu-ly"
        th:class="${activePage == 'cancel'} ? 'nav-item active' : 'nav-item'"
      >
        <i class="fa-solid fa-list-check"></i>
        <span>Lịch sử hủy xử lý</span>
      </a>

      <button
        type="button"
        class="nav-item logout-item"
        onclick="logoutTruSo()"
      >
        <i class="fa-solid fa-right-from-bracket"></i>
        <span>Đăng xuất</span>
      </button>
    </nav>
  </aside>
</div>
