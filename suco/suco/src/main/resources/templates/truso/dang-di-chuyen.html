<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Đang chờ cứu hộ đến - SOS System</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/fragments/truso/sidebar.css}" />
    <link rel="stylesheet" th:href="@{/css/truso/quan-ly-cuu-tro.css}" />
  </head>
  <body>
    <!-- ĐÃ SỬA: Bọc kiểm tra truSo null để tránh sập khi chưa tải kịp dữ liệu -->
    <div
      th:replace="~{fragments/truso/sidebar :: sidebar('pending', ${truSo != null ? truSo : null})}"
    ></div>

    <main class="main-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-3">
          <h2 class="m-0">
            <i class="fa-solid fa-truck-medical text-primary"></i> Đang chờ cứu
            trợ
          </h2>
          <div class="btn-group ms-3" role="group" aria-label="View controls">
            <button
              id="btn-su-co"
              type="button"
              class="btn btn-outline-secondary"
            >
              <i class="fa-solid fa-triangle-exclamation"></i> Sự cố
            </button>
            <button id="btn-sos" type="button" class="btn btn-danger">
              <i class="fa-solid fa-bell"></i> SOS
            </button>
          </div>
        </div>
        <span class="text-muted"
          >Cập nhật: <strong id="clock">00:00:00</strong></span
        >
      </div>

      <div class="row g-4" id="sos-list">
        <div class="col-12 text-center py-5" id="no-data">
          <i class="fa-solid fa-circle-check text-success fa-3x mb-3"></i>
          <p>Hiện không có yêu cầu cứu trợ nào đang chờ!</p>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <script th:inline="javascript">
      <!-- ĐÃ SỬA: Dùng toán tử ?.id để nếu session.currentTruSo bị null thì JS nhận giá trị 0 hoặc null chứ không báo lỗi sập Spring -->
      const TRUSO_ID = /*[[${session.currentTruSo?.id}]]*/ 0;
    </script>

    <script th:src="@{/js/truso/quan-ly-cuu-tro.js}"></script>
    <script th:src="@{/js/fragments/truso/sidebar.js}"></script>
  </body>
</html>
