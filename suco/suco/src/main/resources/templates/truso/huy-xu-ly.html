<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Báo cáo và Tín hiệu được hủy</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/fragments/sidebar-truso.css}" />
    <link rel="stylesheet" th:href="@{/css/truso/huy-xu-ly.css}" />
  </head>
  <body>
    <div
      th:replace="fragments/sidebar-truso :: sidebar('cancel', ${truSo})"
    ></div>
    <main class="main-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Lịch sử hủy xử lý</h2>
        <div class="btn-group">
          <button
            id="btn-filter-su-co"
            class="btn btn-outline-secondary active"
          >
            Sự cố
          </button>
          <button id="btn-filter-sos" class="btn btn-outline-danger">
            SOS
          </button>
        </div>
      </div>

      <div class="table-container">
        <table class="table table-hover align-middle">
          <thead class="table-light">
            <tr id="table-header"></tr>
          </thead>
          <tbody id="history-body"></tbody>
        </table>
        <div id="no-data" class="text-center py-5" style="display: none">
          <i class="fa-solid fa-folder-open fa-3x text-muted mb-3"></i>
          <p class="text-muted">Không có dữ liệu.</p>
        </div>
      </div>
    </main>

    <script th:src="@{/js/truso/huy-xu-ly.js}"></script>
    <script th:src="@{/js/fragments/sidebar-truso.js}"></script>
  </body>
</html>
