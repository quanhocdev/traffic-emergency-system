<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Đăng nhập trụ sở</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f6f8fa;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      .login-box {
        background: #fff;
        padding: 32px 28px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
        width: 100%;
        max-width: 350px;
      }

      .login-title {
        font-size: 20px;
        font-weight: bold;
        color: #008588;
        margin-bottom: 24px;
        text-align: center;
      }

      .login-form {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .login-form input {
        padding: 12px;
        border: 1px solid #d1d5db;
        border-radius: 5px;
        font-size: 15px;
        background: #f9fafb;
      }

      .login-form button {
        background: #008588;
        color: #fff;
        border: none;
        border-radius: 5px;
        padding: 12px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
      }

      .login-form button:hover {
        background: #006b6e;
      }

      .error-message {
        color: #d32f2f;
        background: #fee2e2;
        padding: 8px;
        margin-top: 10px;
        border-radius: 5px;
        font-size: 14px;
        text-align: center;
      }

      .forgot-password {
        display: block;
        margin-top: 18px;
        color: #008588;
        text-align: center;
        text-decoration: none;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="login-box">
      <div class="login-title">Đăng nhập trụ sở</div>

      <form id="loginForm" class="login-form">
        <input name="username" placeholder="Tên đăng nhập" required />
        <input
          name="password"
          type="password"
          placeholder="Mật khẩu"
          required
        />
        <button type="submit">Đăng nhập</button>
      </form>

      <div id="errorBox" class="error-message" style="display: none"></div>

      <a href="#" class="forgot-password">Quên mật khẩu?</a>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const formData = new FormData(e.target);
          const errorBox = document.getElementById("errorBox");

          try {
            const res = await fetch("/truso/login", {
              method: "POST",
              body: formData,
              credentials: "include",
            });

            const data = await res.json();

            if (res.ok) {
              console.log("Login OK:", data);

              // chuyển trang chủ
              window.location.href = "/truso/trang-chu";
            } else {
              errorBox.style.display = "block";
              errorBox.innerText = data.message || "Đăng nhập thất bại";
            }
          } catch (err) {
            errorBox.style.display = "block";
            errorBox.innerText = "Lỗi kết nối server";
          }
        });
    </script>
  </body>
</html>
