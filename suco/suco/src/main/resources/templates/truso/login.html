<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Đăng nhập trụ sở</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/css/truso/login.css}" />
  </head>

  <body>
    <div class="login-box">
      <div class="login-title">Đăng nhập trụ sở</div>

      <form id="loginForm" class="login-form">
        <input name="username" placeholder="Tên đăng nhập" required />
        <input
          name="password"
          type="password"
          placeholder="Mật khẩu"
          required
        />
        <button type="submit">Đăng nhập</button>
      </form>

      <div id="errorBox" class="error-message" style="display: none"></div>

      <a href="#" class="forgot-password">Quên mật khẩu?</a>
    </div>
    <script th:src="@{/js/truso/login.js}"></script>
  </body>
</html>
