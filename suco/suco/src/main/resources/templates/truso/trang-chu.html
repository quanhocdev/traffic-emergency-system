<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Hệ thống Điều hành Cứu trợ</title>
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css"
      rel="stylesheet"
    />
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/fragments/sidebar-truso.css}" />
    <link rel="stylesheet" th:href="@{/css/truso/trang-chu.css}" />
  </head>
  <body>
    <div
      th:replace="~{fragments/sidebar-truso :: sidebar('map', ${truSo?.toString() != null ? truSo : null})}"
    ></div>

    <!-- Toàn bộ không gian làm việc bên phải -->
    <main class="main-content">
      <!-- BẢNG ĐIỀU KHIỂN TRỤ SỞ (Đã được làm gọn và hiện đại hóa) -->
      <!-- BẢNG ĐIỀU KHIỂN TRỤ SỞ MINI DROPDOWN -->
      <div id="station-control-panel" class="scp-dropdown">
        <!-- Phần hiển thị trạng thái hiện tại (Click vào để mở/đóng) -->
        <div class="scp-trigger" onclick="toggleScpDropdown(event)">
          <div class="station-status-preview">
            <i
              class="fa-solid fa-circle status-dot"
              id="station-status-dot"
            ></i>
            <span id="station-status-text">🟢 Sẵn sàng</span>
          </div>
          <i class="fa-solid fa-chevron-down chevron-icon"></i>
        </div>

        <!-- Phần nội dung ẩn, chỉ hiện khi click -->
        <div class="scp-content" id="scp-content">
          <div class="form-group">
            <label for="trangThaiHoatDong">Cập nhật trạng thái</label>
            <select id="trangThaiHoatDong" onchange="updatePreviewDot()">
              <option value="SAN_SANG">🟢 Sẵn sàng</option>
              <option value="NGOAI_TUYEN">⚪ Ngoại tuyến</option>
            </select>
          </div>

          <button onclick="handleSaveStationConfig(event)">
            <i class="fa-solid fa-floppy-disk"></i>
            Lưu trạng thái
          </button>
        </div>
      </div>

      <!-- NÚT THÔNG BÁO -->
      <div id="noti-bell" onclick="toggleNotiList()">
        <div class="bell-icon-wrapper">
          <i class="fa-solid fa-bell"></i>
          <span id="noti-count" style="display: none">0</span>
        </div>

        <div id="noti-list">
          <div class="noti-header">
            <span>Thông báo mới</span>
            <span onclick="clearNoti(event)" class="clear-all">Xóa tất cả</span>
          </div>
          <div id="noti-items-container">
            <div id="empty-noti">Không có thông báo mới</div>
          </div>
        </div>
      </div>

      <!-- CHI TIẾT SỰ CỐ SOS -->
      <div id="sos-detail-panel">
        <div class="panel-header">
          <span
            ><i class="fa-solid fa-circle-info"></i> THÔNG TIN CHI TIẾT</span
          >
          <i
            class="fa-solid fa-xmark"
            style="cursor: pointer"
            onclick="closeDetail()"
          ></i>
        </div>
        <div class="panel-body" id="panel-content"></div>
      </div>

      <!-- BẢN ĐỒ CHIẾM TOÀN BỘ KHÔNG GIAN CÒN LẠI -->
      <div id="map"></div>
    </main>

    <script th:inline="javascript">
      // Sử dụng dấu ?. để nếu currentTruSo bị null thì sẽ lấy giá trị mặc định đằng sau (?:) chứ không nổ lỗi
      const idTruSo = /*[[${session.currentTruSo?.id ?: 0}]]*/ 0;
      const tsLng = /*[[${session.currentTruSo?.kinhDo ?: 106.660172}]]*/ 106.660172;
      const tsLat = /*[[${session.currentTruSo?.viDo ?: 10.762622}]]*/ 10.762622;
      const MAPBOX_TOKEN = /*[[${mapboxToken}]]*/ "";
    </script>
    <script th:src="@{/js/truso/trang-chu.js}"></script>
    <script th:src="@{/js/fragments/sidebar-truso.js}"></script>
  </body>
</html>
