<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Lịch sử cứu hộ - SOS System</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/fragments/truso/sidebar.css}" />
    <link rel="stylesheet" th:href="@{/css/truso/lich-su-cuu-tro.css}" />
  </head>
  <body>
    <!-- ĐÃ SỬA: Bọc kiểm tra truSo null để tránh sập khi tải trang -->
    <div
      th:replace="~{fragments/truso/sidebar :: sidebar('history', ${truSo != null ? truSo : null})}"
    ></div>

    <main class="main-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Lịch sử cứu trợ</h2>
        <div class="btn-group">
          <button
            id="btn-filter-su-co"
            class="btn btn-outline-secondary active"
          >
            Sự cố
          </button>
          <button id="btn-filter-sos" class="btn btn-outline-danger">
            SOS
          </button>
        </div>
      </div>

      <div class="table-container">
        <table class="table table-hover align-middle">
          <thead class="table-light">
            <tr id="table-header"></tr>
          </thead>
          <tbody id="history-body"></tbody>
        </table>
        <div id="no-data" class="text-center py-5" style="display: none">
          <i class="fa-solid fa-folder-open fa-3x text-muted mb-3"></i>
          <p class="text-muted">Không có dữ liệu lịch sử.</p>
        </div>
      </div>
    </main>

    <!-- ĐÃ BỔ SUNG: Nhúng an toàn TRUSO_ID phòng trường hợp file JS của bạn cần gọi API theo trụ sở -->
    <script th:inline="javascript">
      const TRUSO_ID = /*[[${session.currentTruSo?.id}]]*/ 0;
    </script>

    <script th:src="@{/js/truso/lich-su-cuu-tro.js}"></script>
    <script th:src="@{/js/fragments/truso/sidebar.js}"></script>

    <!-- Modal Chi tiết Hóa đơn cứu hộ -->
    <div id="invoice-modal" class="modal-overlay" style="display: none">
      <div class="invoice-box">
        <div class="invoice-header">
          <div class="logo-area">
            <i
              class="fa-solid fa-file-invoice-dollar fa-2x text-danger me-2"
            ></i>
            <h4>HÓA ĐƠN CỨU HỘ KHẨN CẤP</h4>
          </div>
          <button class="btn-close-invoice" onclick="closeInvoiceModal()">
            &times;
          </button>
        </div>

        <div class="invoice-body">
          <div class="invoice-meta mb-3">
            <p><strong>Mã hóa đơn:</strong> <span id="inv-id">#N/A</span></p>
            <p>
              <strong>Thời gian tạo:</strong> <span id="inv-time">N/A</span>
            </p>
          </div>
          <hr />
          <div class="invoice-section">
            <h5><i class="fa-solid fa-circle-info"></i> Nội dung xử lý</h5>
            <div
              id="inv-content"
              class="p-2 border rounded bg-light text-muted"
            ></div>
          </div>

          <div class="invoice-section mt-3">
            <h5><i class="fa-solid fa-credit-card"></i> Chi tiết thanh toán</h5>
            <table class="table table-sm table-borderless">
              <tr>
                <td>Chi phí gốc:</td>
                <td class="text-end" id="inv-base">0 đ</td>
              </tr>
              <tr>
                <td class="text-success">Hội viên giảm giá:</td>
                <td class="text-end text-success" id="inv-discount">-0 đ</td>
              </tr>
              <tr class="border-top font-weight-bold">
                <td><strong>Thực tế thanh toán:</strong></td>
                <td class="text-end text-danger">
                  <strong id="inv-total">0 đ</strong>
                </td>
              </tr>
            </table>
          </div>

          <div class="invoice-section mt-2 p-2 rounded bg-light border">
            <p class="mb-1">
              <strong>Phương thức:</strong>
              <span id="inv-method" class="badge bg-primary">N/A</span>
            </p>
            <p class="mb-1">
              <strong>Mã giao dịch:</strong>
              <small id="inv-transaction" class="text-muted">N/A</small>
            </p>
            <p class="mb-0">
              <strong>Trạng thái:</strong>
              <span id="inv-status" class="badge bg-success">N/A</span>
            </p>
          </div>
        </div>

        <div class="invoice-footer text-center mt-4">
          <button
            class="btn btn-secondary btn-sm"
            onclick="closeInvoiceModal()"
          >
            Đóng cửa sổ
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
