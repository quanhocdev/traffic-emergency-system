<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý loại sự cố</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      :root {
        --sidebar-width: 260px;
        --sidebar-collapsed-width: 75px;
        --primary-color: #1a1a1a;
        --accent-color: #3b82f6;
        --font-main: "Inter", system-ui, sans-serif;
      }

      /* 1. LAYOUT CHÍNH */
      html,
      body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        font-family: var(--font-main);
        background-color: #f8fafc;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }

      #main-container {
        display: flex;
        width: 100%;
        height: 100vh;
      }

      /* 2. SIDEBAR (Giống hệt các trang khác) */
      #sidebar {
        width: var(--sidebar-width);
        background: var(--primary-color);
        color: white;
        transition: width 0.3s ease;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        z-index: 1001;
      }

      #sidebar.collapsed {
        width: var(--sidebar-collapsed-width);
      }

      .sidebar-header {
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #333;
        min-height: 70px;
        box-sizing: border-box;
      }

      .sidebar-header span {
        white-space: nowrap;
        font-weight: bold;
        letter-spacing: 1px;
      }

      #sidebar.collapsed .sidebar-header span {
        display: none;
      }

      .sidebar-menu {
        list-style: none;
        padding: 15px 0;
        margin: 0;
        flex-grow: 1;
      }

      .menu-item {
        display: flex;
        align-items: center;
        padding: 15px 25px;
        color: #aaa;
        text-decoration: none;
        transition: 0.2s;
        white-space: nowrap;
        border-left: 4px solid transparent;
      }

      .menu-item:hover,
      .menu-item.active {
        background: #262626;
        color: white;
        border-left-color: var(--accent-color);
      }

      .menu-item i {
        min-width: 25px;
        text-align: center;
        font-size: 18px;
      }
      .menu-item span {
        margin-left: 15px;
        font-weight: 500;
      }

      #sidebar.collapsed .menu-item span {
        display: none;
      }
      #sidebar.collapsed .menu-item {
        justify-content: center;
        padding: 15px 0;
      }

      .toggle-btn {
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        font-size: 18px;
      }

      /* 3. NỘI DUNG CHÍNH */
      .main-content {
        flex-grow: 1;
        overflow-y: auto;
        padding: 40px;
        box-sizing: border-box;
      }

      .header-title {
        font-size: 24px;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 30px;
        border-left: 5px solid var(--accent-color);
        padding-left: 15px;
      }

      /* 4. FORM TẠO MỚI */
      .form-card {
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        margin-bottom: 30px;
      }

      .form-inline {
        display: flex;
        align-items: flex-end;
        gap: 20px;
        flex-wrap: wrap;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .input-group label {
        font-size: 13px;
        font-weight: 600;
        color: #64748b;
      }

      input[type="text"],
      input[type="file"] {
        padding: 10px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        font-family: var(--font-main);
      }

      .btn-create {
        background: var(--accent-color);
        color: white;
        border: none;
        padding: 11px 25px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-create:hover {
        background: #2563eb;
      }

      /* 5. BẢNG DANH SÁCH */
      .table-container {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
      }

      th {
        background: #f8fafc;
        padding: 15px 20px;
        font-size: 13px;
        font-weight: 700;
        color: #64748b;
        text-transform: uppercase;
        border-bottom: 1px solid #e2e8f0;
      }

      td {
        padding: 15px 20px;
        border-bottom: 1px solid #f1f5f9;
        color: #334155;
        vertical-align: middle;
      }

      .icon-preview {
        width: 40px;
        height: 40px;
        object-fit: contain;
        background: #f1f5f9;
        border-radius: 6px;
        padding: 4px;
      }

      .btn-edit {
        background: #dbeafe;
        color: #3b82f6;
        border: none;
        padding: 8px 15px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        margin-right: 5px;
      }
      .btn-edit:hover {
        background: #bfdbfe;
      }
      .modal {
        display: none;
        position: fixed;
        z-index: 2000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
      }

      .modal-content {
        background: white;
        width: 400px;
        margin: 10% auto;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }
      .btn-delete {
        background: #fee2e2;
        color: #ef4444;
        border: none;
        padding: 8px 15px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-delete:hover {
        background: #fecaca;
      }
    </style>
  </head>
  <body>
    <div id="main-container">
      <nav id="sidebar">
        <div class="sidebar-header">
          <span>DASHBOARD</span>
          <button class="toggle-btn" onclick="toggleSidebar()">
            <i class="fa-solid fa-chevron-left" id="toggle-icon"></i>
          </button>
        </div>
        <ul class="sidebar-menu">
          <li>
            <a href="/admin/trang-chu" class="menu-item"
              ><i class="fa-solid fa-house"></i><span>Trang Chủ</span></a
            >
          </li>
          <li>
            <a href="/admin/quan-ly-user" class="menu-item"
              ><i class="fa-solid fa-users"></i><span>Quản Lý User</span></a
            >
          </li>

          <li>
            <a href="/admin/loai-su-co" class="menu-item active"
              ><i class="fa-solid fa-triangle-exclamation"></i
              ><span>Quản Lý Sự Cố</span></a
            >
          </li>
          <li>
            <a href="/admin/bao-cao-su-co" class="menu-item"
              ><i class="fa-solid fa-file-signature"></i
              ><span>Quản Lý Báo Cáo</span></a
            >
          </li>
          <li>
            <a href="/admin/quan-ly-tru-so" class="menu-item"
              ><i class="fa-solid fa-building"></i
              ><span>Quản Lý Trụ Sở</span></a
            >
          </li>
          <li>
            <a href="/admin/quan-ly-camera" class="menu-item"
              ><i class="fa-solid fa-camera"></i><span>Quản Lý Camera</span></a
            >
          </li>
          <li>
            <a href="/admin/goi" class="menu-item"
              ><i class="fa-solid fa-box"></i><span>Quản Lý Gói SOS</span></a
            >
          </li>
          <li>
            <a href="/admin/quan-ly-qua" class="menu-item"
              ><i class="fa-solid fa-gift"></i><span>Quản Lý Quà</span></a
            >
          </li>
          <li>
            <a href="/admin/quan-ly-doanh-thu" class="menu-item">
              <i class="fas fa-money-bill-wave"></i
              ><span>Quản Lý Doanh Thu</span>
            </a>
          </li>
        </ul>
      </nav>

      <div class="main-content">
        <h2 class="header-title">Quản Lý Loại Sự Cố</h2>

        <div class="form-card">
          <form
            method="post"
            th:action="@{/admin/loai-su-co/create}"
            enctype="multipart/form-data"
            class="form-inline"
          >
            <div class="input-group">
              <label>Tên loại sự cố</label>
              <input
                type="text"
                name="ten"
                placeholder="Ví dụ: Cháy nổ, Ngập lụt..."
                required
              />
            </div>

            <div class="input-group">
              <label>Icon hiển thị</label>
              <input type="file" name="iconFile" accept="image/*" />
            </div>

            <button type="submit" class="btn-create">
              <i class="fa-solid fa-plus"></i> Tạo mới
            </button>
          </form>
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th style="width: 80px">ID</th>
                <th>Tên sự cố</th>
                <th style="width: 120px; text-align: center">Icon</th>
                <th style="width: 150px; text-align: center">Thao tác</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="item : ${list}">
                <td
                  th:text="'#' + ${item.id}"
                  style="font-weight: 600; color: #94a3b8"
                ></td>
                <td th:text="${item.ten}" style="font-weight: 600"></td>
                <td style="text-align: center">
                  <img
                    th:if="${item.iconUrl != null}"
                    th:src="@{${item.iconUrl}}"
                    alt="icon"
                    class="icon-preview"
                  />
                  <span
                    th:unless="${item.iconUrl != null}"
                    style="color: #cbd5e1"
                    >N/A</span
                  >
                </td>
                <td style="text-align: center">
                  <button
                    type="button"
                    class="btn-edit"
                    th:attr="data-id=${item.id}, data-ten=${item.ten}"
                    onclick="openEdit(this)"
                  >
                    <i class="fa-solid fa-pen"></i> Sửa
                  </button>
                  <button
                    type="button"
                    class="btn-delete"
                    th:onclick="'deleteSuCo(' + ${item.id} + ')'"
                  >
                    <i class="fa-solid fa-trash-can"></i> Xóa
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
          <div
            th:if="${#lists.isEmpty(list)}"
            style="padding: 40px; text-align: center; color: #94a3b8"
          >
            Chưa có loại sự cố nào được tạo.
          </div>
        </div>
      </div>
    </div>

    <div id="editModal" class="modal">
      <div class="modal-content">
        <h3>Chỉnh sửa loại sự cố</h3>

        <input type="hidden" id="editId" />

        <div class="input-group">
          <label>Tên loại sự cố</label>
          <input type="text" id="editTen" />
        </div>

        <div class="input-group">
          <label>Đổi icon</label>
          <input type="file" id="editFile" accept="image/*" />
        </div>

        <img
          id="previewIcon"
          style="width: 60px; margin-top: 10px; display: none"
        />

        <div style="margin-top: 20px; text-align: right">
          <button onclick="closeEdit()" class="btn-delete">Hủy</button>
          <button onclick="submitEdit()" class="btn-create">Lưu</button>
        </div>
      </div>
    </div>

    <script>
      // Hàm mở modal chỉnh sửa và điền dữ liệu cũ vào form
      function openEdit(btn) {
        const id = btn.getAttribute("data-id");
        const ten = btn.getAttribute("data-ten");

        document.getElementById("editId").value = id;
        document.getElementById("editTen").value = ten;

        document.getElementById("editModal").style.display = "block";
      }
      // Đóng modal chỉnh sửa
      function closeEdit() {
        document.getElementById("editModal").style.display = "none";
      }
      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        const icon = document.getElementById("toggle-icon");
        sidebar.classList.toggle("collapsed");

        if (sidebar.classList.contains("collapsed")) {
          icon.classList.replace("fa-chevron-left", "fa-chevron-right");
        } else {
          icon.classList.replace("fa-chevron-right", "fa-chevron-left");
        }
      }
      function submitEdit() {
        const id = document.getElementById("editId").value;
        const ten = document.getElementById("editTen").value;
        const file = document.getElementById("editFile").files[0];

        const formData = new FormData();
        if (ten) formData.append("ten", ten);
        if (file) formData.append("iconFile", file);

        fetch(`/admin/loai-su-co/api/update/${id}`, {
          method: "PUT",
          body: formData,
        }).then((res) => {
          if (res.ok) {
            alert("Cập nhật thành công!");
            location.reload();
          } else {
            res.json().then((data) => alert(data.message));
          }
        });
      }
      document.getElementById("editFile").onchange = function (e) {
        const file = e.target.files[0];
        if (file) {
          const img = document.getElementById("previewIcon");
          img.src = URL.createObjectURL(file);
          img.style.display = "block";
        }
      };
      function deleteSuCo(id) {
        if (!confirm("Bạn có chắc muốn xóa loại sự cố này?")) return;

        fetch(`/admin/loai-su-co/delete/${id}`, {
          method: "DELETE",
        })
          .then((response) => {
            if (response.ok) {
              alert("Xóa thành công!");
              location.reload(); // Load lại trang để cập nhật danh sách
            } else {
              alert("Xóa thất bại!");
            }
          })
          .catch((error) => console.error("Error:", error));
      }
    </script>
  </body>
</html>
