<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Quản lý trụ sở - SOS System</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Custom -->
    <link rel="stylesheet" th:href="@{/css/admin/quan-ly-tru-so.css}" />
    <link rel="stylesheet" th:href="@{/css/fragments/sidebar-admin.css}" />
  </head>

  <body>
    <div id="main-container">
      <!-- SIDEBAR -->
      <div th:replace="fragments/sidebar-admin :: sidebar"></div>

      <!-- MAIN CONTENT -->
      <main class="main-content">
        <!-- HEADER -->

        <div
          class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3"
        >
          <div>
            <h2 class="fw-bold text-dark mb-1">
              <i class="fa-solid fa-building text-primary"></i>
              Quản Lý Danh Sách Trụ Sở
            </h2>

            <p class="text-muted mb-0">
              Quản lý tài khoản, vị trí và trạng thái các trụ sở cứu hộ.
            </p>
          </div>

          <button
            class="btn btn-primary d-flex align-items-center gap-2"
            onclick="openModal()"
          >
            <i class="fa-solid fa-plus"></i>

            Thêm trụ sở mới
          </button>
        </div>

        <!-- TOOLBAR -->

        <div class="card shadow-sm border-0 mb-4">
          <div class="card-body">
            <div class="row g-3 align-items-center">
              <!-- SEARCH -->

              <div class="col-md-8">
                <div class="input-group">
                  <span class="input-group-text bg-white">
                    <i class="fa-solid fa-magnifying-glass"></i>
                  </span>

                  <input
                    type="text"
                    id="searchInput"
                    onkeyup="filterTable()"
                    class="form-control"
                    placeholder="Tìm kiếm tên trụ sở hoặc tài khoản..."
                  />
                </div>
              </div>

              <!-- FILTER -->

              <div class="col-md-4">
                <select class="form-select">
                  <option value="">Tất cả trạng thái</option>

                  <option value="ready">Đã có vị trí</option>

                  <option value="pending">Chưa có vị trí</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- TABLE CARD -->

        <div class="card border-0 shadow-sm">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Tên trụ sở</th>

                  <th>Tài khoản</th>

                  <th>Tọa độ</th>

                  <th>Địa chỉ</th>

                  <th>Trạng thái</th>

                  <th class="text-center">Thao tác</th>
                </tr>
              </thead>

              <tbody>
                <tr th:each="st : ${danhSachTruSo}">
                  <td class="fw-semibold" th:text="${st.tenTruSo}"></td>

                  <td th:text="${st.tenDangNhap}"></td>

                  <td>
                    <span
                      th:if="${st.kinhDo != 0}"
                      th:text="${st.kinhDo + ', ' + st.viDo}"
                    >
                    </span>

                    <span
                      th:if="${st.kinhDo == 0}"
                      class="text-muted fst-italic"
                    >
                      Chưa gán vị trí
                    </span>
                  </td>
                  <td
                    th:text="${st.diaChi ?: 'Chưa xác định'}"
                    class="address-cell"
                  ></td>

                  <td>
                    <span
                      th:class="${st.kinhDo != 0 
                                    ? 'status-badge status-ready' 
                                    : 'status-badge status-pending'}"
                      th:text="${st.kinhDo != 0 
                                    ? 'Đã sẵn sàng' 
                                    : 'Chờ định vị'}"
                    >
                    </span>
                  </td>

                  <td class="text-center">
                    <a
                      th:href="@{/admin/trang-chu(assignId=${st.id})}"
                      class="btn-action btn-edit"
                      title="Gán vị trí"
                    >
                      <i class="fa-solid fa-location-crosshairs"></i>

                      Gán tọa độ
                    </a>

                    <button
                      type="button"
                      class="btn-action btn-delete"
                      th:onclick="'confirmDeleteTruSo(' + ${st.id} + ')'"
                    >
                      <i class="fa-solid fa-trash"></i>
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <!-- ==========================
     MODAL THÊM TRỤ SỞ
========================== -->

    <div id="addModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h4 class="fw-bold mb-0">Thêm Trụ Sở Mới</h4>

          <i
            class="fa-solid fa-xmark fs-4"
            style="cursor: pointer"
            onclick="closeModal()"
          >
          </i>
        </div>

        <form id="addStationForm" onsubmit="handleStationSubmit(event)">
          <div class="form-group">
            <label> Tên trụ sở </label>

            <input
              type="text"
              name="tenTruSo"
              placeholder="Ví dụ: Trạm cứu hỏa Quận 1"
              required
            />
          </div>

          <div class="form-group">
            <label> Tài khoản đăng nhập </label>

            <input type="text" name="tenDangNhap" required />
          </div>

          <div class="form-group">
            <label> Mật khẩu </label>

            <input type="password" name="matKhau" required />
          </div>

          <input type="hidden" name="kinhDo" value="0" />

          <input type="hidden" name="viDo" value="0" />

          <div class="modal-footer">
            <button type="button" onclick="closeModal()" class="btn btn-light">
              Hủy
            </button>

            <button type="submit" class="btn btn-primary">
              <i class="fa-solid fa-save"></i>

              Lưu thông tin
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- JS -->

    <script th:src="@{/js/admin/quan-ly-tru-so.js}"></script>

    <script th:src="@{/js/fragments/sidebar-admin.js}"></script>

    <script src="/js/api-client.js"></script>
  </body>
</html>
