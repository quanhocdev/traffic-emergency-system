<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Quản Lý Doanh Thu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />

    <link rel="stylesheet" th:href="@{/css/admin/quan-ly-doanh-thu.css}" />
    <link rel="stylesheet" th:href="@{/css/fragments/admin/sidebar.css}" />
  </head>

  <body>
    <div id="main-container">
      <div th:replace="fragments/admin/sidebar :: sidebar"></div>

      <div class="main-content">
        <!-- TITLE -->
        <h2 class="page-title">Quản Lý Doanh Thu</h2>

        <!-- TOTAL -->
        <div class="row mb-4">
          <div class="col-md-4">
            <div class="card text-white bg-success shadow-sm border-0">
              <div class="card-body p-4">
                <h6 class="text-uppercase mb-2" style="opacity: 0.8">
                  Tổng Doanh Thu
                </h6>

                <h3
                  class="card-title mb-0"
                  th:text="${#numbers.formatDecimal(tongDoanhThu, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"
                >
                  0 VNĐ
                </h3>

                <small class="mt-2 d-block">
                  Tổng tiền từ các giao dịch thành công.
                </small>
              </div>
            </div>
          </div>
        </div>

        <!-- TABLE -->
        <div class="card shadow-sm border-0">
          <div class="card-header bg-white py-3 border-bottom">
            <h5 class="m-0 text-primary">Danh sách thanh toán</h5>
          </div>

          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>ID TT</th>
                    <th>Hóa đơn</th>
                    <th>Trụ sở</th>
                    <th>Phương thức</th>
                    <th>Tổng tiền</th>
                    <th class="text-center">Trạng thái</th>
                    <th class="text-center">Hành động</th>
                  </tr>
                </thead>

                <tbody>
                  <tr th:each="hd : ${listDoanhThu}">
                    <td th:text="${hd.id}"></td>
                    <td th:text="${hd.sosId}"></td>
                    <td th:text="${hd.trusoId}"></td>
                    <td th:text="${hd.userId}"></td>
                    <td th:text="${hd.noiDungXuLy}"></td>

                    <td
                      th:text="${#numbers.formatDecimal(hd.thanhTien, 0, 'COMMA', 0, 'POINT')}"
                    ></td>

                    <td class="text-center">
                      <span
                        th:if="${hd.trangThai == 'PAID'}"
                        class="badge bg-success"
                      >
                        Thành công
                      </span>

                      <span
                        th:if="${hd.trangThai == 'PENDING'}"
                        class="badge bg-warning text-dark"
                      >
                        Chờ xử lý
                      </span>

                      <span
                        th:if="${hd.trangThai == 'FAILED'}"
                        class="badge bg-secondary"
                      >
                        Thất bại
                      </span>
                    </td>

                    <td class="text-center">
                      <button
                        class="btn btn-sm btn-primary"
                        th:attr="onclick=|openDetail(${hd.id})|"
                      >
                        Xem chi tiết
                      </button>
                    </td>
                  </tr>

                  <tr th:if="${#lists.isEmpty(listDoanhThu)}">
                    <td colspan="7" class="text-center py-4 text-muted">
                      Không có dữ liệu
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="detailModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Chi tiết hóa đơn</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <div id="hoaDonInfo" class="mb-3 text-muted">Đang tải...</div>

            <table class="table table-sm">
              <thead>
                <tr>
                  <th>Thời gian</th>
                  <th>Phương thức</th>
                  <th>Số tiền</th>
                  <th>Trạng thái</th>
                </tr>
              </thead>

              <tbody id="paymentTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- SCRIPT -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script th:src="@{/js/admin/quan-ly-doanh-thu.js}"></script>
    <script th:src="@{/js/fragments/admin/sidebar.js}"></script>
  </body>
</html>
