<!doctype html>

<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Quản lý Người dùng - SOS System</title>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- FontAwesome -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="stylesheet" th:href="@{/css/admin/quan-ly-user.css}" />

    <link rel="stylesheet" th:href="@{/css/fragments/sidebar-admin.css}" />
  </head>

  <body>
    <div id="main-container">
      <div th:replace="fragments/sidebar-admin :: sidebar"></div>

      <main class="main-content">
        <div class="container-fluid">
          <div
            class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center mb-4 gap-3"
          >
            <div>
              <h2 class="page-title mb-1">Danh Sách Người Dùng</h2>

              <p class="text-muted mb-0">
                Quản lý toàn bộ người dùng trong hệ thống SOS.
              </p>
            </div>

            <div class="text-secondary">
              Tổng:

              <strong th:text="${#lists.size(listUsers)}"></strong>

              người dùng
            </div>
          </div>

          <!-- SEARCH -->

          <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
              <form
                action="/admin/quan-ly-user"
                method="get"
                class="row g-3 align-items-center"
              >
                <div class="col-12 col-md">
                  <div class="input-group">
                    <span class="input-group-text bg-white">
                      <i class="fa-solid fa-magnifying-glass"></i>
                    </span>

                    <input
                      type="text"
                      class="form-control"
                      name="keyword"
                      th:value="${keyword}"
                      placeholder="Tìm theo tên hoặc email..."
                      onchange="this.form.submit()"
                    />
                  </div>
                </div>
              </form>
            </div>
          </div>

          <!-- TABLE -->

          <div class="card shadow-sm border-0">
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                  <thead class="table-light">
                    <tr>
                      <th>Họ tên</th>

                      <th>Email</th>

                      <th>Provider</th>

                      <th>Gói dịch vụ</th>

                      <th>Điểm</th>

                      <th>Spam</th>

                      <th class="text-center">Thao tác</th>
                    </tr>
                  </thead>

                  <tbody>
                    <tr th:each="u : ${listUsers}">
                      <td>
                        <div class="fw-semibold">
                          <span th:text="${u.name}"></span>
                        </div>
                      </td>

                      <td>
                        <span th:text="${u.email}"></span>
                      </td>

                      <td>
                        <span class="badge text-bg-light border">
                          <span th:text="${u.provider}"></span>
                        </span>
                      </td>

                      <td>
                        <span th:text="${u.tenGoi ?: 'Chưa đăng ký'}"></span>
                      </td>

                      <td>
                        <span class="fw-bold text-primary">
                          <span th:text="${u.totalPoints}"></span>

                          điểm
                        </span>
                      </td>

                      <td>
                        <span
                          th:if="${u.spamCount > 0}"
                          class="badge text-bg-danger"
                        >
                          <i class="fa-solid fa-triangle-exclamation"></i>

                          [[${u.spamCount}]]
                        </span>

                        <span
                          th:if="${u.spamCount == 0}"
                          class="badge text-bg-success"
                        >
                          Uy tín
                        </span>
                      </td>

                      <td class="text-center">
                        <div
                          class="d-flex justify-content-center flex-wrap gap-2"
                        >
                          <a
                            th:if="${u.spamCount > 0}"
                            th:href="@{'/admin/quan-ly-user/reset-spam/' + ${u.uid}}"
                            class="btn btn-outline-primary btn-sm"
                            onclick="
                              return confirm(
                                'Xác nhận người dùng này không spam?',
                              );
                            "
                          >
                            <i class="fa-solid fa-rotate-left"></i>

                            Gỡ Spam
                          </a>

                          <button
                            type="button"
                            class="btn btn-outline-danger btn-sm"
                            th:data-uid="${u.uid}"
                            onclick="confirmDeleteUser(this)"
                          >
                            <i class="fa-solid fa-trash"></i>

                            Xóa
                          </button>
                        </div>
                      </td>
                    </tr>
                  </tbody>
                </table>

                <div
                  th:if="${#lists.isEmpty(listUsers)}"
                  class="text-center py-5 text-secondary"
                >
                  <i
                    class="fa-solid fa-users-slash fa-3x mb-3 text-secondary"
                  ></i>

                  <h5 class="mb-2">Không tìm thấy người dùng</h5>

                  <p class="mb-0">
                    Không có dữ liệu phù hợp với từ khóa tìm kiếm.
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->

    <script th:src="@{/js/admin/quan-ly-user.js}"></script>

    <script th:src="@{/js/fragments/sidebar-admin.js}"></script>

    <script src="/js/api-client.js"></script>
  </body>
</html>
