<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ Thống Quản Lý Sự Cố - Admin Dashboard</title>

    <!-- Bootstrap 5.3 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Mapbox -->
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css"
      rel="stylesheet"
    />
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>
    <link
      rel="stylesheet"
      href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" th:href="@{/css/admin/trang-chu.css}" />
    <link rel="stylesheet" th:href="@{/css/fragments/sidebar-admin.css}" />
  </head>
  <body class="bg-light">
    <button id="mobile-toggle" class="btn btn-light shadow-sm d-md-none">
      <i class="fa-solid fa-bars"></i>
    </button>

    <!-- Container chính -->
    <div
      id="main-container"
      class="page-home position-relative vh-100 overflow-hidden"
    >
      <!-- 1. Map Area nằm dưới cùng (Full 100% màn hình) -->
      <div id="map-wrapper" class="w-100 h-100 position-absolute top-0 start-0">
        <div id="adminMap" class="w-100 h-100"></div>

        <!-- Incident Detail Panel -->
        <div id="incident-detail-panel" class="incident-detail-panel">
          <div class="panel-header">
            <div class="panel-header-left">
              <h3>Chi tiết sự cố khẩn cấp</h3>
              <div id="incident-id-badge-container"></div>
            </div>
            <button class="close-btn" onclick="closeIncidentPanel()">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
          <div id="incident-detail-content"></div>
        </div>

        <!-- Notification Bell -->
        <div id="notification-bell">
          <i class="fa-solid fa-bell"></i>
          <span class="badge" style="display: none">0</span>
          <div id="notification-dropdown" class="notification-dropdown">
            <div class="dropdown-header">Sự cố cần duyệt</div>
            <div id="notification-list" class="notification-list">
              <div class="no-notification">Không có báo cáo cần duyệt</div>
            </div>
            <div class="dropdown-footer">
              <a href="/admin/quan-ly-su-co">Xem tất cả</a>
            </div>
          </div>
        </div>

        <!-- Map Controls -->
        <div id="map-controls">
          <div
            class="control-tab"
            data-target="form-su-co"
            title="Báo cáo sự cố"
          >
            <i class="fa-solid fa-triangle-exclamation"></i>
          </div>
          <div
            class="control-tab"
            data-target="form-sos"
            title="Thêm trụ sở SOS"
          >
            <i class="fa-solid fa-house-medical"></i>
          </div>
          <div class="control-tab" data-target="form-camera" title="Gắn Camera">
            <i class="fa-solid fa-camera"></i>
          </div>
        </div>

        <!-- Side Panels -->
        <!-- Side Panels Container -->
        <div id="side-panel-container">
          <!-- 1. Panel Sự Cố -->
          <div id="form-su-co" class="side-panel">
            <div class="panel-title-bar">
              <h3>
                <i
                  class="fa-solid fa-triangle-exclamation"
                  style="color: #f59e0b"
                ></i>
                <span>Báo Cáo Sự Cố</span>
              </h3>
              <button
                type="button"
                class="close-panel-btn"
                onclick="closeSuCoPanel()"
              >
                <i class="fa-solid fa-xmark" style="font-size: 18px"></i>
              </button>
            </div>

            <form id="adminSubmitForm" enctype="multipart/form-data">
              <!-- Tọa độ 2 cột -->
              <div class="coords-grid">
                <div class="coord-box">
                  <label>Vĩ độ (Lat)</label>
                  <input
                    type="text"
                    class="lat-field"
                    name="viDo"
                    readonly
                    placeholder="Click trên bản đồ"
                  />
                </div>
                <div class="coord-box">
                  <label>Kinh độ (Lng)</label>
                  <input
                    type="text"
                    class="lng-field"
                    name="kinhDo"
                    readonly
                    placeholder="Click trên bản đồ"
                  />
                </div>
              </div>

              <div class="form-group">
                <label class="form-label"
                  >Loại sự cố <span style="color: red">*</span></label
                >
                <select name="loaiSuCo.id" required>
                  <option value="">-- Chọn loại sự cố --</option>
                  <option
                    th:each="loai : ${listLoaiSuCo}"
                    th:value="${loai.id}"
                    th:text="${loai.ten}"
                  ></option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label"
                  >Mô tả sự cố <span style="color: red">*</span></label
                >
                <input
                  type="text"
                  name="moTa"
                  placeholder="Nhập mô tả tình trạng..."
                  required
                />
              </div>

              <div class="form-group">
                <label class="form-label"
                  >Ảnh bằng chứng <span style="color: red">*</span></label
                >
                <input type="file" name="image" accept="image/*" required />
              </div>

              <button
                type="button"
                class="btn-submit btn-submit-warning"
                onclick="handleAdminSubmit()"
              >
                <i class="fa-solid fa-paper-plane"></i> Gửi báo cáo
              </button>
            </form>
          </div>

          <!-- 2. Panel SOS -->
          <div id="form-sos" class="side-panel">
            <div class="panel-title-bar">
              <h3>
                <i class="fa-solid fa-house-medical" style="color: #ef4444"></i>
                <span>Quản Lý Trụ Sở SOS</span>
              </h3>
              <button
                type="button"
                class="close-panel-btn"
                onclick="closeSosPanel()"
              >
                <i class="fa-solid fa-xmark" style="font-size: 18px"></i>
              </button>
            </div>

            <form
              id="sosSubmitForm"
              onsubmit="
                event.preventDefault();
                return false;
              "
            >
              <!-- Tọa độ 2 cột -->
              <div class="coords-grid">
                <div class="coord-box">
                  <label>Vĩ độ (Lat)</label>
                  <input
                    type="text"
                    class="lat-field"
                    name="viDo"
                    readonly
                    placeholder="Click trên bản đồ"
                  />
                </div>
                <div class="coord-box">
                  <label>Kinh độ (Lng)</label>
                  <input
                    type="text"
                    class="lng-field"
                    name="kinhDo"
                    readonly
                    placeholder="Click trên bản đồ"
                  />
                </div>
              </div>

              <!-- Dropdown chọn trụ sở -->
              <div class="target-select-box red">
                <label style="color: #991b1b"
                  >Chọn trụ sở cần gán vị trí:</label
                >
                <select
                  name="id"
                  id="select-tru-so"
                  onchange="toggleNewStationFields()"
                >
                  <option value="">-- TẠO TRỤ SỞ MỚI --</option>
                  <option
                    th:each="ts : ${listTruSoChuaGan}"
                    th:value="${ts.id}"
                    th:text="${ts.tenTruSo}"
                  ></option>
                </select>
              </div>

              <div id="new-station-fields">
                <div class="form-group">
                  <label class="form-label"
                    >Tên trụ sở mới <span style="color: red">*</span></label
                  >
                  <input
                    type="text"
                    name="tenTruSo"
                    placeholder="VD: Trụ sở PCCC Quận 1"
                  />
                </div>
                <div class="form-group">
                  <label class="form-label"
                    >Tên đăng nhập <span style="color: red">*</span></label
                  >
                  <input
                    type="text"
                    name="tenDangNhap"
                    placeholder="Nhập tên tài khoản"
                  />
                </div>
                <div class="form-group">
                  <label class="form-label"
                    >Mật khẩu <span style="color: red">*</span></label
                  >
                  <input
                    type="password"
                    name="matKhau"
                    placeholder="Mật khẩu truy cập"
                  />
                </div>
              </div>

              <button
                type="button"
                class="btn-submit btn-submit-danger"
                onclick="handleSosSubmit()"
              >
                <i class="fa-solid fa-location-dot"></i> Xác nhận vị trí
              </button>
            </form>
          </div>

          <!-- 3. Panel Camera -->
          <div id="form-camera" class="side-panel">
            <div class="panel-title-bar">
              <h3>
                <i class="fa-solid fa-camera" style="color: #2563eb"></i>
                <span>Thiết lập Camera</span>
              </h3>
              <button
                type="button"
                class="close-panel-btn"
                onclick="closeCameraPanel()"
              >
                <i class="fa-solid fa-xmark" style="font-size: 18px"></i>
              </button>
            </div>

            <form id="cameraSubmitForm" enctype="multipart/form-data">
              <!-- Tọa độ 2 cột -->
              <div class="coords-grid">
                <div class="coord-box">
                  <label>Vĩ độ (Lat)</label>
                  <input
                    type="text"
                    name="viDo"
                    class="lat-field"
                    readonly
                    placeholder="Click trên bản đồ"
                  />
                </div>
                <div class="coord-box">
                  <label>Kinh độ (Lng)</label>
                  <input
                    type="text"
                    name="kinhDo"
                    class="lng-field"
                    readonly
                    placeholder="Click trên bản đồ"
                  />
                </div>
              </div>

              <!-- Dropdown Chọn Mục Tiêu -->
              <div class="target-select-box blue">
                <label style="color: #1e3a8a">Chọn mục tiêu:</label>
                <select
                  name="id"
                  id="select-camera"
                  onchange="toggleFormMode()"
                >
                  <option value="">-- TẠO CAMERA MỚI --</option>
                  <option
                    th:each="cam : ${listCameraChuaGan}"
                    th:value="${cam.id}"
                    th:text="${cam.tenCamera}"
                  ></option>
                </select>
              </div>

              <!-- Nhóm Input dữ liệu -->
              <div id="camera-fields-group">
                <div class="form-group">
                  <label class="form-label"
                    >Tên Camera <span style="color: red">*</span></label
                  >
                  <input
                    type="text"
                    name="tenCamera"
                    id="inputTenCamera"
                    placeholder="VD: Camera Vòng Xoay A"
                  />
                </div>

                <div class="form-group">
                  <label class="form-label">Ảnh chụp thực tế</label>
                  <input type="file" name="anhCamera" accept="image/*" />
                </div>

                <div class="form-group">
                  <label class="form-label">Video luồng (MP4)</label>
                  <input type="file" name="videoFile" accept="video/*" />
                </div>
              </div>

              <button
                type="button"
                class="btn-submit btn-submit-primary"
                onclick="handleCameraSubmit()"
              >
                <i class="fa-solid fa-cloud-arrow-up"></i> Xác nhận lưu hệ thống
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- 2. Sidebar Nằm Đè Lên Trên Bản Đồ -->
      <div th:replace="fragments/sidebar-admin :: sidebar"></div>
    </div>

    <script>
      // --- KHỞI TẠO BIẾN TOÀN CỤC ---
      let incidentMarkersMap = {};
      let notificationCount = 0;
      let truSoMarkersList = [];
      let cameraMarkersList = [];

      // --- MAPBOX CONFIGURATION ---
      const MAPBOX_TOKEN = "[[${mapboxToken}]]";
      mapboxgl.accessToken = MAPBOX_TOKEN;

      const savedLng = localStorage.getItem("map_lng");
      const savedLat = localStorage.getItem("map_lat");
      const savedZoom = localStorage.getItem("map_zoom");

      const initialCenter =
        savedLng && savedLat
          ? [parseFloat(savedLng), parseFloat(savedLat)]
          : [106.660172, 10.762622];
      const initialZoom = savedZoom ? parseFloat(savedZoom) : 16;

      const map = new mapboxgl.Map({
        container: "adminMap",
        style: "mapbox://styles/mapbox/streets-v12",
        center: initialCenter,
        zoom: initialZoom,
        pitch: 60,
        bearing: -20,
        antialias: true,
      });
    </script>
    <script src="/js/api-client.js"></script>
    <script th:src="@{/js/admin/trang-chu.js}"></script>
    <script th:src="@{/js/fragments/sidebar-admin.js}"></script>
  </body>
</html>
