<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <title>Quản Lý Quà</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Sidebar CSS trước -->
    <link rel="stylesheet" th:href="@{/css/fragments/sidebar-admin.css}" />

    <!-- Page CSS sau -->
    <link rel="stylesheet" th:href="@{/css/admin/quan-ly-qua.css}" />
  </head>

  <body>
    <div id="main-container" class="d-flex">
      <!-- SIDEBAR -->
      <div th:replace="fragments/sidebar-admin :: sidebar"></div>

      <!-- MAIN CONTENT -->
      <main class="main-content flex-grow-1">
        <!-- TITLE -->
        <div
          class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3"
        >
          <h2 class="page-title mb-0">
            <i class="fa-solid fa-gift text-danger"></i>

            Quản Lý Quà & Voucher
          </h2>
        </div>

        <!-- FORM THÊM QUÀ -->

        <div class="card shadow-sm border-0 mb-5">
          <div class="card-header bg-primary text-white fw-bold">
            <i class="fa-solid fa-plus"></i>

            Thêm quà mới
          </div>

          <div class="card-body">
            <form
              id="formAddQua"
              th:object="${quaRequestDTO}"
              enctype="multipart/form-data"
              class="row g-3"
            >
              <!-- Tên -->

              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">
                  Tên quà / Voucher
                </label>

                <input
                  type="text"
                  class="form-control"
                  th:field="*{ten}"
                  placeholder="Nhập tên quà"
                  required
                />
              </div>

              <!-- Loại -->

              <div class="col-12 col-md-3">
                <label class="form-label fw-semibold"> Loại </label>

                <select
                  class="form-select"
                  id="selectLoaiQua"
                  th:field="*{loai}"
                >
                  <option
                    th:each="l:${loaiQua}"
                    th:value="${l}"
                    th:text="${l}"
                  ></option>
                </select>
              </div>

              <!-- Điểm -->

              <div class="col-12 col-md-3">
                <label class="form-label fw-semibold"> Điểm đổi </label>

                <input
                  type="number"
                  class="form-control"
                  th:field="*{diem}"
                  required
                />
              </div>

              <!-- Mô tả -->

              <div class="col-12">
                <label class="form-label fw-semibold"> Mô tả </label>

                <textarea class="form-control" rows="3" th:field="*{moTa}">
                </textarea>
              </div>

              <!-- Voucher -->

              <div id="voucherFields" class="col-12 d-none">
                <div class="voucher-box">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label class="form-label text-primary fw-semibold">
                        Giảm (%)
                      </label>

                      <input
                        type="number"
                        class="form-control"
                        th:field="*{giaTriGiamPercent}"
                      />
                    </div>

                    <div class="col-md-6">
                      <label class="form-label text-primary fw-semibold">
                        Giảm tối đa
                      </label>

                      <input
                        type="number"
                        class="form-control"
                        th:field="*{giaTriToiDa}"
                      />
                    </div>
                  </div>
                </div>
              </div>

              <!-- Ngày kết thúc -->

              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold"> Ngày kết thúc </label>

                <input
                  type="datetime-local"
                  class="form-control"
                  th:field="*{ngayKetThuc}"
                />
              </div>

              <!-- Hình ảnh -->

              <div class="col-12">
                <label class="form-label fw-semibold"> Hình ảnh </label>

                <input type="file" name="hinhAnh" class="form-control" />
              </div>

              <!-- Button -->

              <div class="col-12">
                <button type="submit" class="btn btn-primary px-4">
                  <i class="fa-solid fa-save"></i>

                  Lưu thông tin
                </button>
              </div>
            </form>
          </div>
        </div>
        <!-- ================= TABLE ================= -->

        <div class="card shadow-sm border-0">
          <div class="card-header bg-dark text-white fw-bold">
            <i class="fa-solid fa-list"></i>

            Danh sách Quà & Voucher
          </div>

          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light text-center">
                  <tr>
                    <th>ID</th>

                    <th>Hình ảnh</th>

                    <th>Tên</th>

                    <th>Loại</th>

                    <th>Điểm</th>

                    <th>Cấu hình Voucher</th>

                    <th>Thời hạn</th>

                    <th>Trạng thái</th>

                    <th>Thao tác</th>
                  </tr>
                </thead>

                <tbody>
                  <tr th:each="q:${listQua}">
                    <td class="text-center" th:text="${q.id}"></td>

                    <td class="text-center">
                      <img
                        th:if="${q.hinhAnh != null}"
                        th:src="@{'/uploads/' + ${q.hinhAnh}}"
                        class="gift-image"
                      />

                      <div th:unless="${q.hinhAnh != null}" class="no-image">
                        <i class="fa-solid fa-image"></i>
                      </div>
                    </td>

                    <td class="fw-bold" th:text="${q.ten}"></td>

                    <td class="text-center">
                      <span
                        th:class="${q.loai.name() == 'VOUCHER'
                                    ? 'badge bg-info'
                                    : 'badge bg-secondary'}"
                        th:text="${q.loai}"
                      >
                      </span>
                    </td>

                    <td class="text-center" th:text="${q.diem}"></td>

                    <td>
                      <div th:if="${q.loai.name()=='VOUCHER'}">
                        <small class="text-success d-block">
                          Giảm:

                          <b th:text="${q.giaTriGiamPercent}"> </b>

                          %
                        </small>

                        <small class="text-danger d-block">
                          Tối đa:

                          <b
                            th:text="${#numbers.formatDecimal(
                                            q.giaTriToiDa,
                                            0,
                                            'COMMA',
                                            0,
                                            'POINT'
                                            )}"
                          >
                          </b>

                          đ
                        </small>
                      </div>

                      <span
                        th:unless="${q.loai.name()=='VOUCHER'}"
                        class="text-muted"
                      >
                        Không áp dụng
                      </span>
                    </td>

                    <td class="text-center">
                      <span
                        th:if="${q.ngayKetThuc != null}"
                        th:text="${#temporals.format(
                                    q.ngayKetThuc,
                                    'dd/MM/yyyy HH:mm'
                                    )}"
                      >
                      </span>

                      <span th:if="${q.ngayKetThuc == null}">
                        Không giới hạn
                      </span>
                    </td>

                    <td class="text-center">
                      <span
                        th:if="${q.ngayKetThuc != null 
                                    and q.ngayKetThuc.isBefore(
                                    T(java.time.LocalDateTime).now())}"
                        class="badge bg-danger"
                      >
                        Hết hạn
                      </span>

                      <select
                        th:if="${q.ngayKetThuc == null 
                                    or q.ngayKetThuc.isAfter(
                                    T(java.time.LocalDateTime).now())}"
                        class="form-select form-select-sm"
                        th:data-id="${q.id}"
                        onchange="changeStatus(this)"
                      >
                        <option
                          value="HOAT_DONG"
                          th:selected="${q.trangThai.name()
                                        =='HOAT_DONG'}"
                        >
                          Hoạt động
                        </option>

                        <option
                          value="NGUNG"
                          th:selected="${q.trangThai.name()
                                        =='NGUNG'}"
                        >
                          Ngưng
                        </option>
                      </select>
                    </td>

                    <td class="text-center">
                      <button
                        class="btn btn-sm btn-outline-primary"
                        onclick="openEditModal(this)"
                        th:data-id="${q.id}"
                        th:data-ten="${q.ten}"
                        th:data-mota="${q.moTa}"
                        th:data-loai="${q.loai}"
                        th:data-diem="${q.diem}"
                        th:data-giam="${q.giaTriGiamPercent}"
                        th:data-toida="${q.giaTriToiDa}"
                        th:data-ngayketthuc="${q.ngayKetThuc}"
                      >
                        <i class="fa-solid fa-pen"></i>
                      </button>

                      <button
                        class="btn btn-sm btn-outline-danger"
                        th:onclick="'deleteQua('+${q.id}+')'"
                      >
                        <i class="fa-solid fa-trash"></i>
                      </button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- ================= MODAL EDIT ================= -->

    <div class="modal fade" id="editModal" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">
              <i class="fa-solid fa-pen"></i>

              Chỉnh sửa quà
            </h5>

            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="editId" />

            <div class="mb-3">
              <label class="form-label fw-bold"> Tên </label>

              <input id="editTen" class="form-control" />
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold"> Mô tả </label>

              <textarea id="editMoTa" class="form-control"> </textarea>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold"> Loại </label>

              <select
                id="editLoai"
                class="form-select"
                onchange="toggleEditVoucherFields()"
              >
                <option value="SAN_PHAM">Sản phẩm</option>

                <option value="VOUCHER">Voucher</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold"> Điểm đổi </label>

              <input id="editDiem" type="number" class="form-control" />
            </div>

            <div id="editVoucherFields" style="display: none">
              <div class="mb-3">
                <label class="form-label text-primary fw-bold"> Giảm % </label>

                <input id="editGiam" type="number" class="form-control" />
              </div>

              <div class="mb-3">
                <label class="form-label text-primary fw-bold">
                  Giảm tối đa
                </label>

                <input id="editToiDa" type="number" class="form-control" />
              </div>
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Đóng
            </button>

            <button class="btn btn-primary" onclick="submitEdit()">
              Lưu thay đổi
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/js/api-client.js"></script>

    <script th:src="@{/js/admin/quan-ly-qua.js}"></script>

    <script th:src="@{/js/fragments/sidebar-admin.js}"></script>
  </body>
</html>
