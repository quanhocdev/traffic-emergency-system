<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Quản lý Gói Cứu Hộ</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Custom -->
    <link rel="stylesheet" th:href="@{/css/admin/quan-ly-goi.css}" />
    <link rel="stylesheet" th:href="@{/css/fragments/sidebar-admin.css}" />
  </head>

  <body>
    <div id="main-container">
      <!-- SIDEBAR -->
      <div th:replace="fragments/sidebar-admin :: sidebar"></div>

      <!-- CONTENT -->
      <div class="main-content container-fluid">
        <!-- HEADER -->

        <div
          class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4"
        >
          <h2 class="page-title mb-0">
            <i class="fa-solid fa-kit-medical text-danger"></i>
            Quản lý Gói Cứu Hộ
          </h2>

          <button class="btn btn-primary" onclick="scrollToForm()">
            <i class="fa-solid fa-plus"></i>
            Thêm gói mới
          </button>
        </div>

        <!-- FORM CREATE -->

        <div id="createForm" class="card shadow-sm border-0 mb-4">
          <div class="card-header bg-primary text-white fw-bold">
            <i class="fa-solid fa-box"></i>
            Thêm gói cứu hộ
          </div>

          <div class="card-body">
            <form id="formGoi" class="row g-3" th:object="${goiMoi}">
              <!-- TEN -->

              <div class="col-12 col-md-4">
                <label class="form-label fw-semibold"> Tên gói </label>

                <input
                  type="text"
                  class="form-control"
                  th:field="*{ten}"
                  placeholder="Ví dụ: Gói VIP"
                  required
                />
              </div>

              <!-- THOI HAN -->

              <div class="col-12 col-md-2">
                <label class="form-label fw-semibold"> Thời hạn </label>

                <div class="input-group">
                  <input
                    type="number"
                    class="form-control"
                    th:field="*{thoiHan}"
                    required
                  />

                  <span class="input-group-text"> ngày </span>
                </div>
              </div>

              <!-- GIA -->

              <div class="col-12 col-md-3">
                <label class="form-label fw-semibold"> Giá </label>

                <div class="input-group">
                  <input
                    type="number"
                    class="form-control"
                    th:field="*{gia}"
                    required
                  />

                  <span class="input-group-text"> VNĐ </span>
                </div>
              </div>

              <!-- KM -->

              <div class="col-12 col-md-3">
                <label class="form-label fw-semibold"> Miễn phí </label>

                <div class="input-group">
                  <input
                    type="number"
                    class="form-control"
                    th:field="*{khoangCachMienPhi}"
                    required
                  />

                  <span class="input-group-text"> KM </span>
                </div>
              </div>

              <!-- MO TA -->

              <div class="col-12">
                <label class="form-label fw-semibold"> Ưu đãi / mô tả </label>

                <textarea
                  class="form-control"
                  rows="3"
                  th:field="*{uuDai}"
                  placeholder="Nhập mô tả gói..."
                >
                </textarea>
              </div>

              <!-- BUTTON -->

              <div class="col-12 text-end">
                <button type="submit" class="btn btn-success px-4">
                  <i class="fa-solid fa-save"></i>

                  Lưu gói
                </button>
              </div>
            </form>
          </div>
        </div>
        <!-- =========================
             TABLE DANH SÁCH GÓI
        ========================== -->

        <div class="card shadow-sm border-0">
          <div class="card-header bg-dark text-white fw-bold">
            <i class="fa-solid fa-list"></i>

            Danh sách gói cứu hộ
          </div>

          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>ID</th>

                    <th>Tên gói</th>

                    <th>Thời hạn</th>

                    <th>Giá</th>

                    <th>Miễn phí</th>

                    <th>Ưu đãi</th>

                    <th class="text-center">Thao tác</th>
                  </tr>
                </thead>

                <tbody>
                  <tr th:each="g : ${listGoi}">
                    <td th:text="${g.id}"></td>

                    <td class="fw-semibold" th:text="${g.ten}"></td>

                    <td>
                      <span
                        class="badge bg-info text-dark"
                        th:text="${g.thoiHan} + ' ngày'"
                      >
                      </span>
                    </td>

                    <td class="text-danger fw-bold">
                      <span
                        th:text="${#numbers.formatDecimal(g.gia,0,'COMMA',0,'POINT')} + ' đ'"
                      >
                      </span>
                    </td>

                    <td>
                      <span
                        class="badge bg-success"
                        th:text="${g.khoangCachMienPhi} + ' KM'"
                      >
                      </span>
                    </td>

                    <td>
                      <div
                        class="truncate-text"
                        th:title="${g.uuDai}"
                        th:text="${g.uuDai}"
                      ></div>
                    </td>

                    <td class="text-center">
                      <button
                        class="btn btn-outline-primary btn-sm me-1"
                        onclick="openEdit(this)"
                        th:attr="
                                        data-id=${g.id},
                                        data-ten=${g.ten},
                                        data-thoihan=${g.thoiHan},
                                        data-gia=${g.gia},
                                        data-khoangcach=${g.khoangCachMienPhi},
                                        data-uudai=${g.uuDai}"
                      >
                        <i class="fa-solid fa-pen"></i>

                        Sửa
                      </button>

                      <button
                        class="btn btn-outline-danger btn-sm"
                        th:onclick="'deleteGoi(' + ${g.id} + ')'"
                      >
                        <i class="fa-solid fa-trash"></i>
                      </button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- =========================
        MODAL EDIT
========================== -->

    <div class="modal fade" id="editModal" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">
              <i class="fa-solid fa-pen"></i>

              Chỉnh sửa gói cứu hộ
            </h5>

            <button class="btn-close" onclick="closeEdit()"></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="editId" />

            <div class="row g-3">
              <div class="col-md-5">
                <label class="form-label"> Tên gói </label>

                <input id="editTen" class="form-control" />
              </div>

              <div class="col-md-3">
                <label class="form-label"> Thời hạn </label>

                <input type="number" id="editThoiHan" class="form-control" />
              </div>

              <div class="col-md-4">
                <label class="form-label"> Giá </label>

                <input type="number" id="editGia" class="form-control" />
              </div>

              <div class="col-md-4">
                <label class="form-label"> KM miễn phí </label>

                <input
                  type="number"
                  id="editKhoangCachMienPhi"
                  class="form-control"
                />
              </div>

              <div class="col-12">
                <label class="form-label"> Ưu đãi </label>

                <textarea id="editUuDai" rows="4" class="form-control">
                </textarea>
              </div>
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeEdit()">
              Đóng
            </button>

            <button class="btn btn-primary" onclick="submitEdit()">
              <i class="fa-solid fa-save"></i>

              Lưu thay đổi
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- JS -->

    <script th:src="@{/js/admin/quan-ly-goi.js}"></script>

    <script src="/js/api-client.js"></script>

    <script th:src="@{/js/fragments/sidebar-admin.js}"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
