<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Quản lý Gói Cứu Hộ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ICON & FONT -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- BOOTSTRAP -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary-color: #1a1a1a;
        --accent-color: #3b82f6;
        --sidebar-width: 260px;
        --sidebar-collapsed-width: 75px;
        --font-main: "Inter", system-ui, sans-serif;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        font-family: var(--font-main);
        background: #f1f5f9;
        overflow: hidden;
      }

      #main-container {
        display: flex;
        height: 100vh;
        width: 100%;
      }

      /* ===== SIDEBAR ===== */
      #sidebar {
        width: var(--sidebar-width);
        background: var(--primary-color);
        color: white;
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
      }

      .sidebar-header {
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #333;
      }

      .toggle-btn {
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        font-size: 18px;
      }

      .sidebar-menu {
        list-style: none;
        padding: 15px 0;
        margin: 0;
        flex-grow: 1;
        overflow-y: auto;
      }

      .menu-item {
        display: flex;
        align-items: center;
        padding: 15px 25px;
        color: #aaa;
        text-decoration: none;
        border-left: 4px solid transparent;
        transition: 0.2s;
      }

      .menu-item i {
        min-width: 25px;
        text-align: center;
      }

      .menu-item span {
        margin-left: 15px;
      }

      .menu-item:hover,
      .menu-item.active {
        background: #262626;
        color: white;
        border-left-color: var(--accent-color);
      }

      /* ===== MAIN CONTENT ===== */
      .main-content {
        flex-grow: 1;
        overflow-y: auto;
        padding: 30px;
      }

      .page-title {
        font-size: 24px;
        font-weight: 700;
        border-left: 5px solid var(--accent-color);
        padding-left: 15px;
        margin-bottom: 25px;
        color: #0f172a;
      }

      /* ===== TRUNCATE ƯU ĐÃI ===== */
      .truncate-text {
        max-width: 200px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        cursor: pointer;
      }

      .truncate-text:hover {
        color: #0d6efd;
      }
      /* ===== SIDEBAR COLLAPSED ===== */
      #sidebar.collapsed {
        width: var(--sidebar-collapsed-width);
      }

      #sidebar.collapsed .menu-item span {
        display: none;
      }

      #sidebar.collapsed .sidebar-header span {
        display: none;
      }

      #sidebar.collapsed .menu-item {
        justify-content: center;
      }

      #sidebar.collapsed .toggle-btn i {
        transform: rotate(180deg);
      }

      .toggle-btn i {
        transition: transform 0.3s;
      }
    </style>
  </head>

  <body>
    <div id="main-container">
      <!-- ===== SIDEBAR ===== -->
      <nav id="sidebar">
        <div class="sidebar-header">
          <span>DASHBOARD</span>
          <button class="toggle-btn">
            <i class="fa-solid fa-chevron-left"></i>
          </button>
        </div>

        <ul class="sidebar-menu">
          <li>
            <a href="/admin/trang-chu" class="menu-item">
              <i class="fa-solid fa-house"></i><span>Trang Chủ</span>
            </a>
          </li>
          <li>
            <a href="/admin/quan-ly-user" class="menu-item"
              ><i class="fa-solid fa-users"></i><span>Quản Lý User</span></a
            >
          </li>

          <li>
            <a href="/admin/loai-su-co" class="menu-item">
              <i class="fa-solid fa-triangle-exclamation"></i>
              <span>Quản Lý Sự Cố</span>
            </a>
          </li>
          <li>
            <a href="/admin/bao-cao-su-co" class="menu-item">
              <i class="fa-solid fa-file-signature"></i>
              <span>Quản Lý Báo Cáo</span>
            </a>
          </li>
          <li>
            <a th:href="@{/admin/quan-ly-tru-so}" class="menu-item"
              ><i class="fa-solid fa-building"></i
              ><span>Quản Lý Trụ Sở</span></a
            >
          </li>
          <li>
            <a th:href="@{/admin/quan-ly-camera}" class="menu-item"
              ><i class="fa-solid fa-camera"></i><span>Quản Lý Camera</span></a
            >
          </li>
          <li>
            <a href="/admin/goi" class="menu-item active">
              <i class="fa-solid fa-box"></i>
              <span>Quản Lý Gói SOS</span>
            </a>
          </li>
          <li>
            <a href="/admin/quan-ly-qua" class="menu-item">
              <i class="fa-solid fa-gift"></i>
              <span>Quản Lý Quà</span>
            </a>
          </li>
          <li>
            <a href="/admin/quan-ly-doanh-thu" class="menu-item">
              <i class="fas fa-money-bill-wave"></i
              ><span>Quản Lý Doanh Thu</span>
            </a>
          </li>
        </ul>
      </nav>

      <!-- ===== MAIN CONTENT ===== -->
      <div class="main-content">
        <h2 class="page-title">Hệ thống Quản lý Gói SOS</h2>

        <!-- FORM -->
        <div class="card mb-5 border-0 shadow-sm">
          <div class="card-header bg-primary text-white fw-bold">
            Thêm Gói Cứu Hộ Mới
          </div>
          <div class="card-body">
            <form id="formGoi" class="row g-3" th:object="${goiMoi}">
              <div class="col-md-4">
                <label class="form-label fw-semibold">Tên gói</label>
                <input
                  type="text"
                  th:field="*{ten}"
                  class="form-control"
                  required
                />
              </div>

              <div class="col-md-2">
                <label class="form-label fw-semibold">Thời hạn (Ngày)</label>
                <input
                  type="number"
                  th:field="*{thoiHan}"
                  class="form-control"
                  required
                />
              </div>

              <div class="col-md-3">
                <label class="form-label fw-semibold">Giá (VNĐ)</label>
                <input
                  type="number"
                  th:field="*{gia}"
                  class="form-control"
                  required
                />
              </div>

              <div class="col-md-3">
                <label class="form-label fw-semibold">KM Miễn phí</label>
                <input
                  type="number"
                  th:field="*{khoangCachMienPhi}"
                  class="form-control"
                  required
                />
              </div>

              <div class="col-12">
                <label class="form-label fw-semibold">Ưu đãi & Mô tả</label>
                <textarea
                  th:field="*{uuDai}"
                  class="form-control"
                  rows="2"
                ></textarea>
              </div>

              <div class="col-12 text-end">
                <button type="submit" class="btn btn-success px-5">
                  Lưu Gói
                </button>
              </div>
            </form>
          </div>
        </div>

        <!-- TABLE -->
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-dark text-white fw-bold">
            Danh sách các gói
          </div>
          <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Tên gói</th>
                  <th>Thời hạn</th>
                  <th>Giá</th>
                  <th>KM</th>
                  <th style="width: 250px">Ưu đãi</th>
                  <th class="text-center">Hành động</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="g : ${listGoi}">
                  <td th:text="${g.id}"></td>
                  <td th:text="${g.ten}" class="fw-bold"></td>
                  <td th:text="${g.thoiHan} + 'd'"></td>
                  <td
                    th:text="${#numbers.formatDecimal(g.gia, 0, 'COMMA', 0, 'POINT')} + 'đ'"
                  ></td>
                  <td th:text="${g.khoangCachMienPhi} + 'km'"></td>
                  <td>
                    <div
                      class="truncate-text"
                      th:title="${g.uuDai}"
                      th:text="${g.uuDai}"
                    ></div>
                  </td>
                  <td class="text-center">
                    <button
                      class="btn btn-outline-danger btn-sm"
                      th:onclick="'deleteGoi(' + ${g.id} + ')'"
                    >
                      Xóa
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <script>
      const toggleBtn = document.querySelector(".toggle-btn");
      const sidebar = document.getElementById("sidebar");

      toggleBtn.addEventListener("click", () => {
        sidebar.classList.toggle("collapsed");
      });

      function deleteGoi(id) {
        if (!confirm("Xóa gói này?")) return;

        fetch(`/api/goi/delete/${id}`, {
          method: "DELETE",
        })
          .then((res) => res.text())
          .then((msg) => {
            alert(msg);
            location.reload();
          })
          .catch((err) => {
            alert("Lỗi khi xóa!");
            console.error(err);
          });
      }

      document
        .getElementById("formGoi")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const data = {
            ten: document.querySelector("[name='ten']").value,
            thoiHan: document.querySelector("[name='thoiHan']").value,
            gia: document.querySelector("[name='gia']").value,
            khoangCachMienPhi: document.querySelector(
              "[name='khoangCachMienPhi']",
            ).value,
            uuDai: document.querySelector("[name='uuDai']").value,
          };

          fetch("/api/goi/create", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(data),
          })
            .then((res) => res.text())
            .then((msg) => {
              alert(msg);
              location.reload();
            });
        });
    </script>
  </body>
</html>
